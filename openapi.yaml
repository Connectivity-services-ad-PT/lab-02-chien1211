openapi: 3.1.0
info:
  title: Smart Campus — Access Gate API (Pair 03)
  version: 1.0.0
  description: Hợp đồng API REST Sync giữa Core Business (Consumer) và Access Gate (Provider).
servers:
  - url: http://localhost:4010
    description: Prism Mock Server
tags:
  - name: health
    description: Kiểm tra trạng thái service
  - name: access-logs
    description: Quản lý lịch sử ra vào
  - name: gates
    description: Quản lý cổng kiểm soát
  - name: cards
    description: Quản lý thẻ định danh
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái Access Gate
      description: Endpoint để theo dõi healthcheck.
      tags: [health]
      security: []
      responses:
        '200':
          description: Service hoạt động bình thường
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: access-gate
                    time: '2026-05-27T08:00:00Z'

  /access/logs/recent:
    get:
      operationId: getRecentAccessLogs
      summary: Lấy danh sách log ra/vào gần nhất
      description: Lấy danh sách access log có phân trang. Hỗ trợ đa hình cho sự kiện quẹt thẻ hoặc mở thủ công.
      tags: [access-logs]
      parameters:
        - name: cursor
          in: query
          required: false
          description: Con trỏ dùng để lấy trang tiếp theo.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Số lượng bản ghi tối đa.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Danh sách access logs
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data, nextCursor]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccessEvent'
                  nextCursor:
                    type: [string, "null"]
              examples:
                successList:
                  value:
                    nextCursor: "eyJ0aW1lc3RhbXAiOiAiMjAyNi0wNS0yN1Q..."
                    data:
                      - eventType: CARD_SWIPE
                        logId: "evt-123"
                        gateId: "GATE-01"
                        timestamp: "2026-05-27T08:15:00Z"
                        status: GRANTED
                        cardId: "CARD-999"
                      - eventType: MANUAL_OVERRIDE
                        logId: "evt-124"
                        gateId: "GATE-02"
                        timestamp: "2026-05-27T08:16:00Z"
                        status: GRANTED
                        operatorId: "GUARD-01"
                        operatorNote: "Mở cổng cho xe cứu thương"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /access/logs/{logId}:
    get:
      operationId: getAccessLogById
      summary: Lấy chi tiết một access log
      description: Lấy chi tiết log ra vào theo ID.
      tags: [access-logs]
      parameters:
        - name: logId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /gates/{gateId}/status:
    get:
      operationId: getGateStatus
      summary: Lấy trạng thái hiện tại của cổng
      description: Kiểm tra cổng đang mở, đóng hay bị khóa khẩn cấp.
      tags: [gates]
      parameters:
        - name: gateId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Z0-9-]+$'
      responses:
        '200':
          description: Lấy trạng thái thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateStatusInfo'
              examples:
                gateLocked:
                  value:
                    gateId: "GATE-01"
                    status: "LOCKED_EMERGENCY"
                    lastMaintenance: "2026-05-01T10:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /cards/{cardId}:
    get:
      operationId: getCardInfo
      summary: Lấy thông tin thẻ
      description: Trả về trạng thái hoạt động của thẻ.
      tags: [cards]
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lấy dữ liệu thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardInfo'
              examples:
                activeCard:
                  value:
                    cardId: "CARD-999"
                    isActive: true
                    ownerId: "USR-001"
                    expiredAt: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
        time:
          type: string
          format: date-time

    AccessEvent:
      oneOf:
        - $ref: '#/components/schemas/CardSwipeEvent'
        - $ref: '#/components/schemas/ManualOverrideEvent'
      discriminator:
        propertyName: eventType
        mapping:
          CARD_SWIPE: '#/components/schemas/CardSwipeEvent'
          MANUAL_OVERRIDE: '#/components/schemas/ManualOverrideEvent'

    BaseAccessEvent:
      type: object
      additionalProperties: false
      required: [logId, gateId, timestamp, status, eventType]
      properties:
        logId:
          type: string
        gateId:
          type: string
        timestamp:
          type: string
          format: date-time
        status:
          type: string
          enum: [GRANTED, DENIED]
        eventType:
          type: string

    CardSwipeEvent:
      allOf:
        - $ref: '#/components/schemas/BaseAccessEvent'
        - type: object
          required: [cardId]
          properties:
            cardId:
              type: string

    ManualOverrideEvent:
      allOf:
        - $ref: '#/components/schemas/BaseAccessEvent'
        - type: object
          required: [operatorId]
          properties:
            operatorId:
              type: string
            operatorNote:
              type: [string, "null"]
              description: Ghi chú của bảo vệ, dùng union type với null

    GateStatusInfo:
      type: object
      additionalProperties: false
      required: [gateId, status]
      properties:
        gateId:
          type: string
        status:
          type: string
          enum: [OPEN, CLOSED, MAINTENANCE, LOCKED_EMERGENCY]
        lastMaintenance:
          type: [string, "null"]
          format: date-time

    CardInfo:
      type: object
      additionalProperties: false
      required: [cardId, isActive, ownerId]
      properties:
        cardId:
          type: string
        isActive:
          type: boolean
        ownerId:
          type: string
        expiredAt:
          type: [string, "null"]
          format: date-time

    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: [string, 'null']
        instance:
          type: [string, 'null']
          format: uri
        errors:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [field, code, message]
            properties:
              field:
                type: string
              code:
                type: string
              message:
                type: string

  responses:
    BadRequest:
      description: Dữ liệu sai định dạng
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Thiếu hoặc sai thông tin xác thực
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Không tìm thấy tài nguyên
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    InternalServerError:
      description: Lỗi hệ thống nội bộ
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'